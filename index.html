<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fukuoka Travel 2026 - Official Guide</title>
    
    <!-- PWA & Mobile Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: #FFFAF0; 
            margin: 0;
            color: #1e293b;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-active {
            background-color: #bbdfff;
            color: #334155;
            box-shadow: 0 4px 12px rgba(187, 223, 255, 0.4);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 修正滑動問題 */
        main {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Icons (SVG) ---
        const Icon = {
            Calendar: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            Wallet: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            Shopping: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Plus: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Plane: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1Z"/></svg>,
            Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Refresh: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>,
            MapPin: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="12" r="3"/></svg>,
            ChevronRight: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        };

        // --- Data ---
        const ITINERARY_DATA = [
            {
                date: "4/17", day: "Day 1: 福岡天神首航", weather: { temp: "18°C / 12°C", condition: "晴時多雲", icon: "☀️" },
                attractions: [
                    { time: "14:40", name: "桃園TPE ➡️ 福岡FUK (CI128)", duration: "2h 25m", description: "搭乘中華航空 CI128 班機。18:05 抵達福岡。", type: 'flight' },
                    { time: "18:05", name: "抵達福岡機場", duration: "1 小時", description: "搭乘接駁巴士前往地鐵站 ➡️ 轉乘機場線至天神站。", image: "https://d1grca2t3zpuug.cloudfront.net/2025/10/fukuokaairport_cover-870x500-1759925994.webp" },
                    { time: "19:30", name: "飯店 Check-in", duration: "30 min", description: "入住 QUINTESSA 福岡天神 Comic & Books。", type: 'hotel', image: "https://q-xx.bstatic.com/xdata/images/hotel/max500/284226582.jpg?k=53722a659e2b23ea3a9dc5e16bacb538d655839122790a0df93484178003d07d&o=" },
                    { time: "20:30", name: "天神晚餐時光", duration: "2 小時", description: "天神地區人氣美食推薦。", type: 'dinner', image: "https://resources.matcha-jp.com/resize/720x2000/2024/04/23-177958.webp",
                      subItems: [
                        { name: "元祖博多めんたい重 西中洲", time: "07:00 ~ 22:30", note: "整條明太子霸氣躺在白飯上。" },
                        { name: "麵屋兼虎 天神本店", time: "10:00 ~ 22:00", note: "濃厚派沾麵，湯底極佳。" }
                      ]
                    }
                ]
            },
            {
                date: "4/18", day: "Day 2: 博多巡禮與購物", weather: { temp: "20°C / 14°C", condition: "晴朗", icon: "☀️" },
                attractions: [
                    { time: "10:30", name: "食堂 おわん (早餐)", duration: "1.5 小時", description: "以高湯玉子燒為主，搭配中洲明太子。", image: "https://arne.media/uploads/2025/06/DSC01801-2.jpg" },
                    { time: "12:00", name: "櫛田神社", duration: "1 小時", description: "博多最古老的神社之一。", image: "https://resources.matcha-jp.com/resize/720x2000/2024/04/19-177478.webp" },
                    { time: "14:00", name: "博多運河城", duration: "3 小時", description: "ALPEN 福岡、拉麵競技場。", image: "https://assets.funliday.com/posts/wp-content/uploads/2024/12/02162019/Snapinsta.app_415939155_879937227472084_2068015520542221285_n_1080-1.jpg" },
                    { time: "17:30", name: "博多午茶點心", duration: "1.5 小時", description: "品嚐博多在地超人氣麵包與甜點。", type: 'dinner', image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRufFzDgHq6icxXlK2SSZNrwNrpIAtoBanlCg&s",
                      subItems: [
                        { name: "Dacomecca", time: "07:00 - 19:00", note: "香腸薄脆噴汁。" },
                        { name: "Imonne Hakata", time: "10:00 - 21:00", note: "柔軟麻糬包裹冰淇淋。" }
                      ]
                    },
                    { time: "19:45", name: "西新初喜 (壽喜燒)", duration: "2 小時", description: "福岡老字號精肉店直營。", image: "https://image.kkday.com/v2/image/get/s1.kkday.com/product_179016/20240522144823_G60AM/jpg" }
                ]
            },
            {
                date: "4/19", day: "Day 3: 太宰府文化之旅", weather: { temp: "16°C / 8°C", condition: "多雲", icon: "☁️" },
                attractions: [
                    { time: "09:30", name: "天神 ➡️ 太宰府 (旅人列車)", duration: "1 小時", description: "搭乘西鐵太宰府觀光列車「旅人」。", type: 'transport', image: "https://missrosetraveljournal.wordpress.com/wp-content/uploads/2020/07/logo-1-1.jpg",
                      subItems: [
                        { name: "「旅人 TABITO」列車", time: "特色介紹", note: "外部彩繪四季花卉，內部由5種開運紋樣構成。" }
                      ]
                    },
                    { time: "10:30", name: "寶滿宮竈門神社", duration: "1.5 小時", description: "結緣之神「玉依姬命」。", image: "https://hanejapan.com/wp-content/uploads/2025/08/28083419_m-1024x681.jpg" },
                    { time: "12:00", name: "太宰府天滿宮", duration: "3 小時", description: "奉祀學問之神菅原道真。", image: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiO9lUQwWJUmSU_X2ZLk8nlNTTjANq5Wvhtw_rA5PD44liTb7_Gt3QauCuEap96OMURIfv_hhD5UimLrl4vFWx7X3jKXE3PLPlsuLx1qYL6mMTKx-KSBMON0Kup6c3rt2bu4dGpGnFmuuCqbM0wanJSxKlDC-QCsVu7eeK0PHNTr6p82kcvDDrUv601efUW/s1600-rw/%E5%A4%AA%E5%AE%B0%E5%BA%9C%E5%A4%A9%E6%BB%BF%E5%AE%AE.jpg" },
                    { time: "15:30", name: "太宰府參道點心", duration: "2 小時", description: "品嚐在地特色名產。", type: 'dinner', image: "https://article-image.travel.navitime.jp/img/NTJmat0614-zh-tw/NTJmat0614.03.jpg",
                      subItems: [
                        { name: "一蘭拉麵 太宰府店", time: "五角碗", note: "全球唯一五角碗。" },
                        { name: "梅枝餅 かさの家", time: "職人現烤", note: "創業於1922年。" }
                      ]
                    }
                ]
            },
            {
                date: "4/20", day: "Day 4: 相島貓島與燒肉", weather: { temp: "17°C / 11°C", condition: "晴時多雲", icon: "⛅" },
                attractions: [
                    { time: "10:00", name: "天神 ➡️ 相島 (去程)", duration: "1h 47m", description: "前往新宮港搭船。", type: 'transport', image: "https://image.kkday.com/v2/image/get/c_fill%2Cq_55%2Ct_webp%2Cw_960/s1.kkday.com/product_135793/20221115025903_IPoj0/jpg" },
                    { time: "11:30", name: "相島 (貓島) 探索", duration: "4 小時", description: "島上生活著約180隻貓咪。", image: "https://www.japaholic.com/storage/files/article_images/MTEyMDI0MDUwNzE4MTkxMjgx.jpg" },
                    { time: "19:00", name: "藥院燒肉 NIKUICHI", duration: "2 小時", description: "九州產黑毛和牛。", image: "https://d1grca2t3zpuug.cloudfront.net/2025/09/yakiniku_jyou2025_MAIN-870x500-1756977231.webp" }
                ]
            },
            {
                date: "4/21", day: "Day 5: 大濠公園與歸途", weather: { temp: "19°C / 13°C", condition: "晴朗", icon: "☀️" },
                attractions: [
                    { time: "10:00", name: "ROBATA NO ITO OKASHI", duration: "1.5 小時", description: "銀鮭一夜干十分厚實。", image: "https://image.kkday.com/v2/image/get/c_fill%2Cq_55%2Ct_webp%2Cw_960/s1.kkday.com/product_274101/20250320014044_d12r1/png" },
                    { time: "12:00", name: "大濠公園 / &LOCALS", duration: "3 小時", description: "悠閒散步。", image: "https://static.gltjp.com/glt/data/directory/14000/13298/20220724_182904_2ee5f53b_w640.webp" },
                    { time: "21:00", name: "福岡FUK ➡️ 桃園TPE (CI117)", duration: "2.5 小時", description: "搭機回家。", type: 'flight' }
                ]
            }
        ];

        // --- Components ---
        const Card = ({ item, onClick }) => {
            if (item.type === 'flight' || item.type === 'transport') {
                const parts = item.name.includes(' ➡️ ') ? item.name.split(' ➡️ ') : [item.name, ''];
                const color = item.type === 'flight' ? 'from-[#88B0E6] to-[#5A86C2]' : 'from-[#93C5FD] to-[#60A5FA]';
                return (
                    <div className={`w-full bg-gradient-to-br ${color} rounded-3xl shadow-lg text-white p-5 mb-4 flex items-center justify-between border border-white/20`}>
                        <div className="flex-1">
                            <div className="text-[10px] font-black opacity-70 uppercase tracking-widest">{item.type}</div>
                            <div className="text-xl font-black leading-tight">{parts[0].split('(')[0]}</div>
                            <div className="text-xs font-bold opacity-70 mt-1">{item.time}</div>
                        </div>
                        <div className="px-4 opacity-80">{item.type === 'flight' ? <Icon.Plane /> : <Icon.Refresh />}</div>
                        <div className="flex-1 text-right">
                            <div className="text-[10px] font-black opacity-70 uppercase tracking-widest">Arrival</div>
                            <div className="text-xl font-black leading-tight">{parts[1] ? parts[1].split('(')[0] : 'FUK'}</div>
                            <div className="text-xs font-bold opacity-70 mt-1">Fukuoka</div>
                        </div>
                    </div>
                );
            }
            return (
                <div onClick={onClick} className="bg-white rounded-[28px] shadow-sm overflow-hidden flex border border-slate-100 mb-4 active:scale-[0.98] transition-all cursor-pointer">
                    <div className="w-28 h-32 flex-shrink-0">
                        <img src={item.image || 'https://picsum.photos/seed/fukuoka/200/300'} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                    </div>
                    <div className="p-4 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 className="text-sm font-black text-slate-800 line-clamp-1">{item.name}</h3>
                            <p className="text-[11px] text-slate-500 line-clamp-2 mt-1">{item.description}</p>
                        </div>
                        <div className="flex items-center justify-between mt-2">
                            <div className="flex items-center gap-1 text-slate-400 text-[10px] font-bold">
                                <Icon.Clock /> {item.duration}
                            </div>
                            <div className="text-[#D97706]"><Icon.MapPin /></div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');
            const [activeDay, setActiveDay] = useState(0);
            const [selectedAttraction, setSelectedAttraction] = useState(null);
            
            // --- Persistent State (Lifting State Up) ---
            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('fukuoka_exp_v2');
                return saved ? JSON.parse(saved) : [];
            });
            const [shoppingItems, setShoppingItems] = useState(() => {
                const saved = localStorage.getItem('fukuoka_shop_v2');
                return saved ? JSON.parse(saved) : [];
            });

            // UI States
            const [isAddingBudget, setIsAddingBudget] = useState(false);
            const [newItem, setNewItem] = useState("");
            const [newAmount, setNewAmount] = useState("");
            const [newCurrency, setNewCurrency] = useState('JPY');
            const [paymentMethod, setPaymentMethod] = useState('cash');
            const [displayCurrency, setDisplayCurrency] = useState('TWD');
            const [newShopItem, setNewShopItem] = useState("");
            const rate = 0.21;

            // Save to LocalStorage
            useEffect(() => { localStorage.setItem('fukuoka_exp_v2', JSON.stringify(expenses)); }, [expenses]);
            useEffect(() => { localStorage.setItem('fukuoka_shop_v2', JSON.stringify(shoppingItems)); }, [shoppingItems]);

            const addExpense = () => {
                if (!newItem || !newAmount) return;
                const jpy = newCurrency === 'TWD' ? parseFloat(newAmount) / rate : parseFloat(newAmount);
                const newExp = { id: Date.now(), item: newItem, amount: jpy, method: paymentMethod, date: new Date().toLocaleDateString() };
                setExpenses([newExp, ...expenses]);
                setNewItem(""); setNewAmount(""); setIsAddingBudget(false);
            };

            const addShopItem = () => {
                if (!newShopItem) return;
                setShoppingItems([{ id: Date.now(), name: newShopItem, bought: false }, ...shoppingItems]);
                setNewShopItem("");
            };

            const currentDay = ITINERARY_DATA[activeDay];

            return (
                <div className="min-h-screen max-w-md mx-auto relative pb-32">
                    <main className="no-scrollbar">
                        {activeTab === 'itinerary' && (
                            <div className="animate__animated animate__fadeIn">
                                <div className="h-52 w-full relative">
                                    <img src="https://www.wendyjourney.com/wp-content/uploads/2025/05/Fukuoka.jpg" className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#FFFAF0] to-transparent" />
                                </div>
                                <div className="p-4 space-y-4">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                        {ITINERARY_DATA.map((day, idx) => (
                                            <button key={idx} onClick={() => setActiveDay(idx)} className={`flex-shrink-0 w-16 h-16 rounded-2xl flex flex-col items-center justify-center border-2 transition-all ${activeDay === idx ? 'bg-[#bbdfff] border-[#bbdfff] shadow-md' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                <span className="text-[9px] font-black opacity-50 uppercase">D0{idx + 1}</span>
                                                <span className="text-xs font-black">{day.date}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <span className="text-3xl">{currentDay.weather.icon}</span>
                                            <div><div className="text-xs font-black text-[#5A86C2]">{currentDay.weather.condition}</div><div className="text-xs font-bold text-slate-400">{currentDay.weather.temp}</div></div>
                                        </div>
                                    </div>
                                    <h2 className="text-sm font-black text-slate-800 border-l-4 border-[#ffdda5] pl-3">{currentDay.day}</h2>
                                    <div className="space-y-4">
                                        {currentDay.attractions.map((item, idx) => (
                                            <Card key={idx} item={item} onClick={() => item.type !== 'flight' && setSelectedAttraction(item)} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'budget' && (
                            <div className="p-6 pt-10 space-y-6 animate__animated animate__fadeIn">
                                <h2 className="text-xl font-black text-slate-800">旅費管理</h2>
                                <div className="bg-white p-10 rounded-[40px] shadow-sm text-center border border-white relative">
                                    <button onClick={() => setDisplayCurrency(displayCurrency === 'TWD' ? 'JPY' : 'TWD')} className="bg-[#bbdfff]/40 px-4 py-1.5 rounded-full text-[10px] font-black text-[#5A86C2] mb-4 uppercase tracking-widest flex items-center gap-2 mx-auto"><Icon.Refresh /> 切換幣別 ({displayCurrency})</button>
                                    <div className="text-5xl font-black text-[#5A86C2] tracking-tighter">
                                        {displayCurrency === 'TWD' ? `$ ${(expenses.reduce((a,b)=>a+b.amount,0)*rate).toLocaleString(undefined,{maximumFractionDigits:0})}` : `¥ ${expenses.reduce((a,b)=>a+b.amount,0).toLocaleString()}`}
                                    </div>
                                </div>
                                <button onClick={() => setIsAddingBudget(true)} className="w-full bg-[#bbdfff] text-slate-700 py-5 rounded-3xl font-black flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"><Icon.Plus /> 記一筆支出</button>
                                <div className="space-y-3">
                                    {expenses.map(exp => (
                                        <div key={exp.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-white">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-lg">{exp.method === 'cash' ? '💵' : '💳'}</div>
                                                <div><div className="text-sm font-black">{exp.item}</div><div className="text-[9px] font-bold text-slate-400">{exp.date}</div></div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="text-right"><div className="text-sm font-black">¥{exp.amount.toLocaleString()}</div><div className="text-[9px] font-bold text-slate-400">$ {(exp.amount * rate).toLocaleString(undefined, {maximumFractionDigits:0})}</div></div>
                                                <button onClick={() => setExpenses(expenses.filter(e=>e.id!==exp.id))} className="text-slate-200 hover:text-red-400"><Icon.Trash /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'shopping' && (
                            <div className="p-6 pt-10 space-y-6 animate__animated animate__fadeIn">
                                <h2 className="text-xl font-black text-slate-800">購物清單</h2>
                                <div className="bg-white p-6 rounded-3xl border border-white shadow-sm">
                                    <div className="flex gap-2 mb-6">
                                        <input type="text" value={newShopItem} onChange={e => setNewShopItem(e.target.value)} placeholder="想買的東西..." className="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 ring-[#bbdfff]" />
                                        <button onClick={addShopItem} className="bg-[#bbdfff] p-3 rounded-xl shadow-sm"><Icon.Plus /></button>
                                    </div>
                                    <div className="space-y-3">
                                        {shoppingItems.map(item => (
                                            <div key={item.id} className={`flex items-center justify-between p-4 rounded-2xl border ${item.bought ? 'bg-slate-50 opacity-60' : 'bg-white shadow-sm'}`}>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setShoppingItems(shoppingItems.map(s=>s.id===item.id?{...s,bought:!s.bought}:s))}>
                                                        {item.bought ? <Icon.Check className="text-[#5A86C2]" /> : <div className="w-5 h-5 border-2 border-slate-200 rounded-full" />}
                                                    </button>
                                                    <span className={`text-sm font-bold ${item.bought ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.name}</span>
                                                </div>
                                                <button onClick={() => setShoppingItems(shoppingItems.filter(s=>s.id!==item.id))} className="text-slate-200 hover:text-red-400"><Icon.Trash /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="p-6 pt-10 space-y-6 animate__animated animate__fadeIn">
                                <h2 className="text-xl font-black text-slate-800">實用資訊</h2>
                                <div className="space-y-3">
                                    {[
                                        { name: "警察局 (Police)", num: "110", icon: "👮" },
                                        { name: "救護車/火警 (Ambulance)", num: "119", icon: "🚑" },
                                        { name: "台北駐日經濟文化代表處", num: "03-3280-7811", icon: "🇹🇼" }
                                    ].map((c, i) => (
                                        <a key={i} href={`tel:${c.num.replace(/-/g,'')}`} className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-white">
                                            <div className="flex items-center gap-4"><span className="text-2xl">{c.icon}</span><div><div className="text-sm font-black text-slate-800">{c.name}</div><div className="text-[10px] font-bold text-slate-400">{c.num}</div></div></div>
                                            <div className="w-8 h-8 bg-[#bbdfff]/20 rounded-full flex items-center justify-center text-[#5A86C2]"><Icon.ChevronRight /></div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    <AnimatePresence>
                        {selectedAttraction && (
                            <div className="fixed inset-0 z-[100] flex items-end justify-center bg-black/40 backdrop-blur-sm" onClick={() => setSelectedAttraction(null)}>
                                <motion.div initial={{y:'100%'}} animate={{y:0}} exit={{y:'100%'}} className="bg-white w-full max-w-md rounded-t-[32px] overflow-hidden shadow-2xl max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                    <div className="h-56 w-full flex-shrink-0 relative">
                                        <img src={selectedAttraction.image || 'https://picsum.photos/seed/fuk/800/600'} className="w-full h-full object-cover" />
                                        <button onClick={() => setSelectedAttraction(null)} className="absolute top-4 right-4 w-10 h-10 bg-black/20 rounded-full flex items-center justify-center text-white"><Icon.Plus style={{transform:'rotate(45deg)'}} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto no-scrollbar pb-10">
                                        <h3 className="text-xl font-black text-slate-800">{selectedAttraction.name}</h3>
                                        <div className="flex items-center gap-3 mt-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest"><Icon.Clock /> {selectedAttraction.duration} • {selectedAttraction.time}</div>
                                        {selectedAttraction.subItems ? (
                                            <div className="mt-6 space-y-4">
                                                {selectedAttraction.subItems.map((sub, i) => (
                                                    <div key={i} className="bg-[#FFFAF0] p-4 rounded-2xl border border-[#ffdda5]/30">
                                                        <div className="text-xs font-black text-slate-800 mb-1">{sub.name}</div>
                                                        <div className="text-[10px] font-bold text-[#5A86C2] mb-1">{sub.time}</div>
                                                        <p className="text-[11px] text-slate-500 leading-relaxed">{sub.note}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : <p className="text-sm text-slate-600 mt-4 leading-relaxed">{selectedAttraction.description}</p>}
                                        <button onClick={() => setSelectedAttraction(null)} className="w-full mt-8 bg-slate-100 py-4 rounded-2xl font-black text-slate-500">關閉</button>
                                    </div>
                                </motion.div>
                            </div>
                        )}

                        {isAddingBudget && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => setIsAddingBudget(false)}>
                                <motion.div initial={{scale:0.9,opacity:0}} animate={{scale:1,opacity:1}} exit={{scale:0.9,opacity:0}} className="bg-white w-full max-w-sm rounded-[32px] p-8 space-y-5 shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <h3 className="text-xl font-black text-center text-slate-800">新增支出</h3>
                                    <div className="space-y-4">
                                        <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)} placeholder="品項" className="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none text-sm" />
                                        <input type="number" value={newAmount} onChange={e => setNewAmount(e.target.value)} placeholder="金額" className="w-full bg-slate-50 rounded-2xl px-4 py-4 outline-none font-black text-lg" />
                                        <div className="flex gap-2">
                                            {['JPY', 'TWD'].map(c => (
                                                <button key={c} onClick={() => setNewCurrency(c)} className={`flex-1 py-2 rounded-xl text-[10px] font-black border-2 transition-all ${newCurrency === c ? 'bg-[#bbdfff] border-[#bbdfff]' : 'bg-white border-slate-100'}`}>{c}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            {['cash', 'credit'].map(m => (
                                                <button key={m} onClick={() => setPaymentMethod(m)} className={`flex-1 py-3 rounded-2xl text-[10px] font-black border-2 transition-all ${paymentMethod === m ? 'bg-[#bbdfff] border-[#bbdfff]' : 'bg-white border-slate-100'}`}>{m === 'cash' ? '現金' : '信用卡'}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={addExpense} className="w-full py-4 rounded-2xl font-black text-slate-700 bg-[#bbdfff] shadow-md active:scale-95 transition-all">確認新增</button>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    {/* Bottom Nav */}
                    {!isAddingBudget && !selectedAttraction && (
                        <div className="fixed bottom-6 left-0 right-0 px-6 flex justify-center z-50">
                            <nav className="w-full max-w-xs glass rounded-full p-1.5 flex justify-around shadow-xl">
                                {[
                                    { id: 'itinerary', icon: <Icon.Calendar />, label: '行程' },
                                    { id: 'budget', icon: <Icon.Wallet />, label: '記帳' },
                                    { id: 'shopping', icon: <Icon.Shopping />, label: '購物' },
                                    { id: 'info', icon: <Icon.Info />, label: '資訊' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex flex-col items-center py-2.5 rounded-full transition-all ${activeTab === tab.id ? 'tab-active' : 'text-slate-400'}`}>
                                        {tab.icon}
                                        <span className="text-[9px] font-black mt-1 uppercase tracking-tighter">{tab.label}</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
